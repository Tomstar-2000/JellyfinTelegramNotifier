name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Jellyfin.Plugin.TelegramNotifier.zip"
          
          # Get commits since last tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="Initial release v${VERSION}"
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --oneline | tr '\n' '; ' | sed 's/; $//')
          fi

          jq --arg ver "$VERSION" \
             --arg ts "$TIMESTAMP" \
             --arg url "$SOURCE_URL" \
             --arg cl "$CHANGELOG" \
             '.[0].versions |= ([{
               "version": $ver,
               "changelog": $cl,
               "targetAbi": (.[0].versions[0].targetAbi // "10.11.0.0"),
               "sourceUrl": $url,
               "checksum": "00000000000000000000000000000000",
               "timestamp": $ts
             }] + .)' \
             manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

      - name: Build plugin
        run: dotnet publish Jellyfin.Plugin.TelegramNotifier.csproj -c Release -o out

      - name: Create zip
        run: |
          cd out
          zip -r ../Jellyfin.Plugin.TelegramNotifier.zip .

      - name: Generate MD5 and update manifest
        run: |
          CHECKSUM=$(md5sum Jellyfin.Plugin.TelegramNotifier.zip | cut -d ' ' -f 1)
          echo $CHECKSUM > checksum.txt
          jq --arg ck "$CHECKSUM" '.[0].versions[0].checksum = $ck' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jellyfin.Plugin.TelegramNotifier.zip
            checksum.txt
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
